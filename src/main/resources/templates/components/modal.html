<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Reusable Modal Component
     Usage:
     <div th:insert="components/modal :: modal(id='editModal', title='Edit Item', size='lg')">
         <div th:insert="components/modal :: modal-body">
             <!-- Form content here -->
         </div>
     </div>
-->

<div th:fragment="modal(id, title, size)" class="modal fade" th:id="${id}" tabindex="-1">
    <div class="modal-dialog" th:classappend="${size ? 'modal-' + size : ''}">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" th:text="${title}"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" th:fragment="modal-body">
                <!-- Content will be inserted here -->
            </div>
            <div class="modal-footer" th:fragment="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>
</div>
