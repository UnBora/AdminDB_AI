<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Reusable Pagination Component
     Usage:
     <nav th:insert="components/pagination :: pagination(page=${currentPage}, total=${totalPages})"></nav>
-->

<nav th:fragment="pagination(page, total)" aria-label="Page navigation">
    <ul class="pagination pagination-sm">
        <li class="page-item" th:classappend="${page == 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" th:href="${page > 1 ? '?page=' + (page - 1) : '#'}">Previous</a>
        </li>
        <li class="page-item active"><span class="page-link" th:text="${page + ' / ' + total}"></span></li>
        <li class="page-item" th:classappend="${page == total ? 'disabled' : ''}">
            <a class="page-link" href="#" th:href="${page < total ? '?page=' + (page + 1) : '#'}">Next</a>
        </li>
    </ul>
</nav>
