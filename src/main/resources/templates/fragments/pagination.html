<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- 
    Reusable Pagination Component
    
    Usage:
    <nav th:insert="fragments/pagination :: pagination(
        pageInfo=page,
        baseUrl='/users',
        showSize=true)"
    ></nav>
    
    Parameters:
    - pageInfo: Spring Data Page object with number, size, totalPages, totalElements
    - baseUrl: Base URL for pagination links
    - showSize: Boolean - show page size selector (default: true)
    - size: Current page size
    - maxLinks: Maximum number of page links to show (default: 5)
-->

<nav th:fragment="pagination(pageInfo, baseUrl, showSize, size, maxLinks)"
     aria-label="Page navigation"
     th:if="${pageInfo != null and pageInfo.totalPages > 1}">
    
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <!-- Page Info Text -->
        <div class="text-muted small">
            <span th:text="#{pagination.showing(${pageInfo.number * pageInfo.size + 1}, 
                        ${pageInfo.number * pageInfo.size + pageInfo.numberOfElements}, 
                        ${pageInfo.totalElements})}"></span>
        </div>

        <!-- Page Size Selector -->
        <div th:if="${showSize}" class="d-flex align-items-center gap-2">
            <label th:for="pageSize" class="form-label mb-0">
                <span th:text="#{pagination.page-size}"></span>
            </label>
            <select id="pageSize" name="size" class="form-select form-select-sm" style="width: auto;">
                <option value="10" th:selected="${pageInfo.size == 10}">10</option>
                <option value="25" th:selected="${pageInfo.size == 25}">25</option>
                <option value="50" th:selected="${pageInfo.size == 50}">50</option>
                <option value="100" th:selected="${pageInfo.size == 100}">100</option>
            </select>
        </div>
    </div>

    <!-- Pagination Controls -->
    <ul class="pagination justify-content-center mb-0 flex-wrap">
        <!-- First Page Button -->
        <li class="page-item" th:classappend="${pageInfo.isFirst() ? 'disabled' : ''}">
            <a th:if="${!pageInfo.isFirst()}"
               class="page-link"
               th:href="${baseUrl + '?page=0&size=' + pageInfo.size}"
               title="First page"
               aria-label="Go to first page">
                <i class="bi bi-chevron-double-left"></i>
                <span class="d-none d-sm-inline ms-1" th:text="#{pagination.first}"></span>
            </a>
            <span th:if="${pageInfo.isFirst()}" class="page-link" aria-disabled="true">
                <i class="bi bi-chevron-double-left"></i>
                <span class="d-none d-sm-inline ms-1" th:text="#{pagination.first}"></span>
            </span>
        </li>

        <!-- Previous Page Button -->
        <li class="page-item" th:classappend="${pageInfo.isFirst() ? 'disabled' : ''}">
            <a th:if="${!pageInfo.isFirst()}"
               class="page-link"
               th:href="${baseUrl + '?page=' + (pageInfo.number - 1) + '&size=' + pageInfo.size}"
               aria-label="Go to previous page">
                <i class="bi bi-chevron-left"></i>
                <span class="d-none d-sm-inline ms-1" th:text="#{pagination.previous}"></span>
            </a>
            <span th:if="${pageInfo.isFirst()}" class="page-link" aria-disabled="true">
                <i class="bi bi-chevron-left"></i>
                <span class="d-none d-sm-inline ms-1" th:text="#{pagination.previous}"></span>
            </span>
        </li>

        <!-- Page Number Links -->
        <li th:each="pageNum : ${#numbers.sequence(
                    #numbers.max(0, pageInfo.number - (#numbers.max(1, maxLinks != null ? maxLinks : 5) - 1) / 2),
                    #numbers.min(pageInfo.totalPages - 1, pageInfo.number + (#numbers.max(1, maxLinks != null ? maxLinks : 5) - 1) / 2)
                )}"
            class="page-item"
            th:classappend="${pageNum == pageInfo.number ? 'active' : ''}">
            
            <a th:if="${pageNum != pageInfo.number}"
               class="page-link"
               th:href="${baseUrl + '?page=' + pageNum + '&size=' + pageInfo.size}"
               th:text="${pageNum + 1}"
               th:attr="aria-label=${'Go to page ' + (pageNum + 1)}"></a>
            
            <span th:if="${pageNum == pageInfo.number}"
                  class="page-link"
                  th:text="${pageNum + 1}"
                  aria-current="page"></span>
        </li>

        <!-- Next Page Button -->
        <li class="page-item" th:classappend="${pageInfo.isLast() ? 'disabled' : ''}">
            <a th:if="${!pageInfo.isLast()}"
               class="page-link"
               th:href="${baseUrl + '?page=' + (pageInfo.number + 1) + '&size=' + pageInfo.size}"
               aria-label="Go to next page">
                <span class="d-none d-sm-inline me-1" th:text="#{pagination.next}"></span>
                <i class="bi bi-chevron-right"></i>
            </a>
            <span th:if="${pageInfo.isLast()}" class="page-link" aria-disabled="true">
                <span class="d-none d-sm-inline me-1" th:text="#{pagination.next}"></span>
                <i class="bi bi-chevron-right"></i>
            </span>
        </li>

        <!-- Last Page Button -->
        <li class="page-item" th:classappend="${pageInfo.isLast() ? 'disabled' : ''}">
            <a th:if="${!pageInfo.isLast()}"
               class="page-link"
               th:href="${baseUrl + '?page=' + (pageInfo.totalPages - 1) + '&size=' + pageInfo.size}"
               title="Last page"
               aria-label="Go to last page">
                <span class="d-none d-sm-inline me-1" th:text="#{pagination.last}"></span>
                <i class="bi bi-chevron-double-right"></i>
            </a>
            <span th:if="${pageInfo.isLast()}" class="page-link" aria-disabled="true">
                <span class="d-none d-sm-inline me-1" th:text="#{pagination.last}"></span>
                <i class="bi bi-chevron-double-right"></i>
            </span>
        </li>
    </ul>
</nav>

<!-- Simplified pagination with just prev/next -->
<nav th:fragment="pagination-simple(pageInfo, baseUrl)"
     aria-label="Simple page navigation"
     th:if="${pageInfo != null and pageInfo.totalPages > 1}">
    
    <ul class="pagination justify-content-center mb-0">
        <li class="page-item" th:classappend="${pageInfo.isFirst() ? 'disabled' : ''}">
            <a th:if="${!pageInfo.isFirst()}"
               class="page-link"
               th:href="${baseUrl + '?page=' + (pageInfo.number - 1)}">
                <i class="bi bi-chevron-left"></i>
                <span th:text="#{pagination.previous}"></span>
            </a>
            <span th:if="${pageInfo.isFirst()}" class="page-link">
                <i class="bi bi-chevron-left"></i>
                <span th:text="#{pagination.previous}"></span>
            </span>
        </li>

        <li class="page-item active">
            <span class="page-link" th:text="#{pagination.page-info(${pageInfo.number + 1}, ${pageInfo.totalPages})}"></span>
        </li>

        <li class="page-item" th:classappend="${pageInfo.isLast() ? 'disabled' : ''}">
            <a th:if="${!pageInfo.isLast()}"
               class="page-link"
               th:href="${baseUrl + '?page=' + (pageInfo.number + 1)}">
                <span th:text="#{pagination.next}"></span>
                <i class="bi bi-chevron-right"></i>
            </a>
            <span th:if="${pageInfo.isLast()}" class="page-link">
                <span th:text="#{pagination.next}"></span>
                <i class="bi bi-chevron-right"></i>
            </span>
        </li>
    </ul>
</nav>

</body>
</html>
