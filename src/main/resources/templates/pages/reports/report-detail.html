<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/main-layout}">
<head>
    <title>Report Detail</title>
</head>
<body>
<div layout:fragment="content" class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2 th:text="${report.name}"></h2>
        </div>
        <div class="col-md-4 text-end">
            <div class="btn-group" role="group">
                <a href="/reports" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <div class="btn-group" role="group">
                    <button id="exportDropdown" type="button" class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <ul class="dropdown-menu" aria-labelledby="exportDropdown">
                        <li><a class="dropdown-item" href="#" th:onclick="|exportReport('${report.id}', 'excel')|">
                            <i class="fas fa-file-excel"></i> Export as Excel
                        </a></li>
                        <li><a class="dropdown-item" href="#" th:onclick="|exportReport('${report.id}', 'csv')|">
                            <i class="fas fa-file-csv"></i> Export as CSV
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card mb-4">
                <div class="card-header bg-light">
                    <h5 class="mb-0">Report Information</h5>
                </div>
                <div class="card-body">
                    <dl class="row">
                        <dt class="col-md-3">Name:</dt>
                        <dd class="col-md-9" th:text="${report.name}"></dd>

                        <dt class="col-md-3">Description:</dt>
                        <dd class="col-md-9" th:text="${report.description}"></dd>

                        <dt class="col-md-3">Type:</dt>
                        <dd class="col-md-9">
                            <span class="badge bg-info" th:text="${report.type}"></span>
                        </dd>

                        <dt class="col-md-3">Format:</dt>
                        <dd class="col-md-9">
                            <span class="badge bg-warning" th:text="${report.format}"></span>
                        </dd>

                        <dt class="col-md-3">Created:</dt>
                        <dd class="col-md-9" th:text="${#dates.format(report.createdAt, 'MMM dd, yyyy HH:mm')}"></dd>

                        <dt class="col-md-3">Last Updated:</dt>
                        <dd class="col-md-9" th:text="${report.updatedAt != null ? #dates.format(report.updatedAt, 'MMM dd, yyyy HH:mm') : 'Never'}"></dd>
                    </dl>
                </div>
            </div>

            <div class="card" th:if="${report.isScheduled}">
                <div class="card-header bg-light">
                    <h5 class="mb-0">Schedule Information</h5>
                </div>
                <div class="card-body">
                    <dl class="row">
                        <dt class="col-md-3">Frequency:</dt>
                        <dd class="col-md-9" th:text="${report.scheduleFrequency}"></dd>

                        <dt class="col-md-3">Last Run:</dt>
                        <dd class="col-md-9" th:text="${report.lastRunAt != null ? #dates.format(report.lastRunAt, 'MMM dd, yyyy HH:mm') : 'Never'}"></dd>
                    </dl>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card">
                <div class="card-header bg-light">
                    <h5 class="mb-0">Actions</h5>
                </div>
                <div class="card-body d-grid gap-2">
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#editModal">
                        <i class="fas fa-edit"></i> Edit Report
                    </button>
                    <button type="button" class="btn btn-success" onclick="generateReport()">
                        <i class="fas fa-play"></i> Generate Now
                    </button>
                    <button type="button" class="btn btn-danger" onclick="deleteReport()">
                        <i class="fas fa-trash"></i> Delete Report
                    </button>
                </div>
            </div>

            <div class="card mt-3">
                <div class="card-header bg-light">
                    <h5 class="mb-0">Report Status</h5>
                </div>
                <div class="card-body">
                    <div class="alert alert-info mb-0">
                        <i class="fas fa-info-circle"></i> Report is ready for export
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Report</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <div class="mb-3">
                            <label for="editName" class="form-label">Report Name</label>
                            <input type="text" class="form-control" id="editName" th:value="${report.name}">
                        </div>
                        <div class="mb-3">
                            <label for="editDesc" class="form-label">Description</label>
                            <textarea class="form-control" id="editDesc" rows="3" th:text="${report.description}"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div layout:fragment="scripts">
    <script th:inline="javascript">
    const reportId = [[${report.id}]];

    function exportReport(id, format) {
        window.location.href = `/api/reports/${id}/export/${format}`;
    }

    function generateReport() {
        showNotification('Report generation started...', 'info');
        setTimeout(() => {
            showNotification('Report generated successfully', 'success');
        }, 2000);
    }

    function deleteReport() {
        if (!confirm('Are you sure you want to delete this report?')) return;
        
        $.ajax({
            url: `/api/reports/${reportId}`,
            method: 'DELETE',
            success: function() {
                showNotification('Report deleted successfully', 'success');
                setTimeout(() => {
                    window.location.href = '/reports';
                }, 1500);
            },
            error: function() {
                showNotification('Error deleting report', 'error');
            }
        });
    }

    function saveEdit() {
        const formData = {
            name: $('#editName').val(),
            description: $('#editDesc').val(),
            type: [[${report.type}]],
            format: [[${report.format}]],
            isScheduled: [[${report.isScheduled}]]
        };

        $.ajax({
            url: `/api/reports/${reportId}`,
            method: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            success: function() {
                showNotification('Report updated successfully', 'success');
                setTimeout(() => {
                    location.reload();
                }, 1500);
            },
            error: function() {
                showNotification('Error updating report', 'error');
            }
        });
    }
    </script>
</div>
</body>
</html>
