databaseChangeLog:
  - changeSet:
      id: v015_create_file_metadata_table
      author: admin
      changes:
        - createTable:
            tableName: file_metadata
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: original_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: file_size
                  type: BIGINT
              - column:
                  name: file_type
                  type: VARCHAR(50)
              - column:
                  name: mime_type
                  type: VARCHAR(100)
              - column:
                  name: storage_type
                  type: VARCHAR(50)
                  defaultValue: LOCAL
              - column:
                  name: storage_path
                  type: TEXT
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: is_public
                  type: BOOLEAN
                  defaultValue: false
              - column:
                  name: download_count
                  type: BIGINT
                  defaultValue: 0
              - column:
                  name: module
                  type: VARCHAR(50)
              - column:
                  name: entity_id
                  type: UUID
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: UUID
              - column:
                  name: updated_by
                  type: UUID
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValue: false

        - createIndex:
            indexName: idx_file_metadata_user
            tableName: file_metadata
            columns:
              - column:
                  name: created_by

        - createIndex:
            indexName: idx_file_metadata_type
            tableName: file_metadata
            columns:
              - column:
                  name: file_type

        - createIndex:
            indexName: idx_file_metadata_name
            tableName: file_metadata
            columns:
              - column:
                  name: file_name
