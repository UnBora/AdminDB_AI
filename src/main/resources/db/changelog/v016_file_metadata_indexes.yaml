databaseChangeLog:
  - changeSet:
      id: v016_update_file_metadata_table
      author: admin
      changes:
        - addColumn:
            tableName: file_metadata
            columns:
              - column:
                  name: original_name
                  type: VARCHAR(255)
              - column:
                  name: storage_type
                  type: VARCHAR(50)
                  defaultValue: LOCAL
              - column:
                  name: storage_path
                  type: TEXT
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: is_public
                  type: BOOLEAN
                  defaultValue: false
              - column:
                  name: download_count
                  type: BIGINT
                  defaultValue: 0
              - column:
                  name: module
                  type: VARCHAR(50)
              - column:
                  name: entity_id
                  type: UUID

        - createIndex:
            indexName: idx_file_metadata_user
            tableName: file_metadata
            columns:
              - column:
                  name: created_by

        - createIndex:
            indexName: idx_file_metadata_type
            tableName: file_metadata
            columns:
              - column:
                  name: file_type

        - createIndex:
            indexName: idx_file_metadata_name
            tableName: file_metadata
            columns:
              - column:
                  name: file_name
