databaseChangeLog:
  - changeSet:
      id: v005_create_role_permissions_table
      author: platform
      changes:
        - createTable:
            tableName: role_permissions
            columns:
              - column:
                  name: role_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_role_permissions_role
                    references: roles(id)
              - column:
                  name: permission_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_role_permissions_permission
                    references: permissions(id)

        - addPrimaryKey:
            tableName: role_permissions
            columnNames: role_id, permission_id
            constraintName: pk_role_permissions

        - createIndex:
            tableName: role_permissions
            indexName: idx_role_permissions_role_id
            columns:
              - column:
                  name: role_id

        - createIndex:
            tableName: role_permissions
            indexName: idx_role_permissions_permission_id
            columns:
              - column:
                  name: permission_id
