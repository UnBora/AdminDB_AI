databaseChangeLog:
  - changeSet:
      id: v010_create_app_settings_table
      author: platform
      changes:
        - createTable:
            tableName: app_settings
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: setting_key
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: setting_value
                  type: jsonb
              - column:
                  name: category
                  type: varchar(100)
              - column:
                  name: description
                  type: varchar(500)
              - column:
                  name: deleted
                  type: boolean
                  defaultValue: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: uuid
              - column:
                  name: updated_by
                  type: uuid

        - createIndex:
            tableName: app_settings
            indexName: idx_app_settings_key
            columns:
              - column:
                  name: setting_key

        - createIndex:
            tableName: app_settings
            indexName: idx_app_settings_category
            columns:
              - column:
                  name: category
