databaseChangeLog:
  - changeSet:
      id: v006_create_menus_table
      author: platform
      changes:
        - createTable:
            tableName: menus
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: translation_key
                  type: varchar(255)
              - column:
                  name: url
                  type: varchar(255)
              - column:
                  name: icon
                  type: varchar(100)
              - column:
                  name: parent_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_menus_parent
                    references: menus(id)
              - column:
                  name: order_number
                  type: integer
                  defaultValue: 0
              - column:
                  name: active
                  type: boolean
                  defaultValue: true
              - column:
                  name: deleted
                  type: boolean
                  defaultValue: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: created_by
                  type: uuid
              - column:
                  name: updated_by
                  type: uuid

        - createIndex:
            tableName: menus
            indexName: idx_menus_parent_id
            columns:
              - column:
                  name: parent_id

        - createIndex:
            tableName: menus
            indexName: idx_menus_order_number
            columns:
              - column:
                  name: order_number
